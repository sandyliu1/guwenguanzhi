<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古文词汇学习</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>古文词汇分析</h1>
    <div class="custom-select" id="article-select-wrapper">
      <div class="custom-select-trigger" id="article-select-trigger">选择文章</div>
      <ul class="custom-select-dropdown" id="article-select-dropdown"></ul>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot dot-shici"></div>
        <span>实词</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-xuci"></div>
        <span>虚词</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="panel-text">
      <div id="article-title"></div>
      <div id="text-display"></div>
    </div>
    <div class="panel-results">
      <!-- 详情视图（点击词后显示） -->
      <div id="word-detail" class="word-detail hidden">
        <button id="detail-back">← 返回列表</button>
        <div id="detail-content"></div>
      </div>
      <!-- 总览列表 -->
      <div id="results"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
