<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古文观止</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>古文观止</h1>
    <button id="nav-toggle" title="显示/隐藏目录">☰</button>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot dot-shici"></div>
        <span>实词</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-xuci"></div>
        <span>虚词</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-key"></div>
        <span>重点</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="panel-text">
      <div id="nav-search-box">
        <input id="nav-search" type="text" placeholder="搜索文章…" autocomplete="off">
      </div>
      <div id="article-nav"></div>
    </div>
    <div id="article-body">
      <div class="article-header">
        <div id="article-title"></div>
        <button id="bg-toggle" title="背景信息" style="display:none">背景</button>
        <button id="map-toggle" title="地图" style="display:none">地图</button>
      </div>
      <div id="text-display"></div>
    </div>
  </div>

  <!-- 右侧抽屉 -->
  <div id="word-drawer" class="word-drawer">
    <button id="word-drawer-close">✕</button>
    <div id="word-drawer-content"></div>
  </div>

  <!-- 背景信息侧边抽屉 -->
  <div id="bg-drawer" class="bg-drawer">
    <button id="bg-drawer-close">✕</button>
    <div id="bg-drawer-content"></div>
  </div>

  <!-- 地图抽屉 -->
  <div id="map-drawer" class="bg-drawer">
    <button id="map-drawer-close">✕</button>
    <div id="map-drawer-content"></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
